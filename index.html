<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Sumair & Maryam 💕 Flappy Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#07070f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:none;-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.bg-glow{position:absolute;pointer-events:none;top:25%;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(255,107,157,0.06) 0%,transparent 70%)}
.bg-glow2{position:absolute;pointer-events:none;bottom:25%;left:33%;width:400px;height:300px;background:radial-gradient(ellipse,rgba(192,132,252,0.05) 0%,transparent 70%)}
#gameWrap{position:relative;width:100%;max-width:500px;border-radius:16px;overflow:hidden;box-shadow:0 0 60px rgba(255,107,157,0.15),0 0 120px rgba(139,69,214,0.08);border:1px solid rgba(255,255,255,0.05)}
canvas{display:block;width:100%;cursor:pointer}
#overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fadeIn .5s ease}
#overlay.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ov-inner{text-align:center;padding:24px 32px;max-width:85%}
.girl-circle{width:112px;height:112px;margin:0 auto 16px;border-radius:50%;overflow:hidden;border:3px solid rgba(244,114,182,0.5);box-shadow:0 0 30px rgba(255,107,157,0.4)}
.girl-circle img{width:100%;height:100%;object-fit:cover}
.girl-label{margin-top:-8px;display:inline-block;background:rgba(0,0,0,0.6);color:#f9a8d4;font-size:12px;font-weight:700;padding:4px 12px;border-radius:9999px;border:1px solid rgba(244,114,182,0.3)}
.ov-title{font-size:24px;font-weight:800;color:#f87171;margin-bottom:8px;letter-spacing:-0.02em}
.death-box{display:inline-block;margin-bottom:12px;padding:8px 16px;border-radius:12px;border:1px solid rgba(248,113,113,0.3);background:rgba(248,113,113,0.1)}
.death-box p{font-size:14px;font-weight:700;color:#fca5a5}
.scores{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:16px}
.sc{text-align:center}
.sc .num{font-size:30px;font-weight:800}
.sc .lbl{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.sc-pink .num{color:#f472b6}.sc-purple .num{color:#c084fc}
.divider{width:1px;height:40px;background:rgba(255,255,255,0.1)}
.new-best{margin-bottom:16px;animation:bounce 1s infinite}
.new-best span{display:inline-block;background:linear-gradient(to right,#fbbf24,#f472b6);color:#000;font-size:12px;font-weight:700;padding:6px 16px;border-radius:9999px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.retry-btn{padding:12px 32px;background:linear-gradient(to right,#ec4899,#a855f7);color:#fff;font-weight:700;font-size:14px;border:none;border-radius:9999px;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,157,0.4);transition:all .2s}
.retry-btn:hover{background:linear-gradient(to right,#f472b6,#a78bfa);transform:scale(1.05)}
.retry-btn:active{transform:scale(0.95)}
.hint{font-size:12px;color:rgba(255,255,255,0.3);margin-top:12px}
footer{margin-top:16px;text-align:center}
footer p{font-size:11px;color:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div id="gameWrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <div class="ov-inner">
      <div class="girl-circle"><img id="girlImg" alt="Maryam"></div>
      <div class="girl-label">Maryam 💔</div>
      <div class="ov-title">You Fell For Me! 💔</div>
      <div class="death-box"><p id="deathMsg"></p></div>
      <div class="scores">
        <div class="sc sc-pink"><div class="num" id="finalScore">0</div><div class="lbl">Hearts ❤️</div></div>
        <div class="divider"></div>
        <div class="sc sc-purple"><div class="num" id="bestScore">0</div><div class="lbl">Best 👑</div></div>
      </div>
      <div class="new-best" id="newBestBox" style="display:none"><span>✨ NEW BEST SCORE! ✨</span></div>
      <button class="retry-btn" id="retryBtn">Try Again 😋</button>
      <p class="hint">Tap or press Space to retry</p>
    </div>
  </div>
</div>
<footer><p>Made with 💕 for Sumair & Maryam</p></footer>

  canvasW=w;canvasH=h;
  initStars(w,h);
  if(phase==='IDLE')playerY=h/2;
}

function initStars(w,h){
  stars=[];
  for(let i=0;i<80;i++){
    stars.push({
      x:Math.random()*w,y:Math.random()*(h-GROUND_HEIGHT),
      size:Math.random()*2+0.5,speed:Math.random()*0.3+0.1,
      brightness:Math.random()*0.5+0.5,
      twinkleSpeed:Math.random()*0.03+0.01,
      twinkleOffset:Math.random()*Math.PI*2,
    });
  }
}

// Load boy image
const boyImgEl=new Image();
boyImgEl.src=BOY_SRC;
boyImgEl.onload=()=>{boyImg=boyImgEl;};

// ─── Particle spawners ───
function spawnFlapParticles(x,y){
  const colors=['#ff6b9d','#fb7185','#f472b6','#fbbf24','#f9a8d4'];
  for(let i=0;i<5;i++){
    particles.push({
      x,y:y+10,vx:(Math.random()-0.6)*2.5,vy:Math.random()*2+0.5,
      life:1,maxLife:1,size:Math.random()*7+5,
      color:colors[Math.floor(Math.random()*5)],
      type:'heart',rotation:0,rotationSpeed:0,
    });
  }
}
function spawnScoreParticles(x,y){
  const colors=['#ff6b9d','#ff1493','#ff69b4','#fbbf24','#ff85a2','#ffffff'];
  for(let i=0;i<16;i++){
    const a=Math.PI*2*i/16,s=Math.random()*3.5+2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,maxLife:1,
      size:Math.random()*5+2,color:colors[Math.floor(Math.random()*6)],
      type:'sparkle',rotation:0,rotationSpeed:0});
  }
  for(let i=0;i<4;i++){
    particles.push({x:x+(Math.random()-0.5)*30,y:y+(Math.random()-0.5)*30,
      vx:(Math.random()-0.5)*2,vy:-Math.random()*2-1,life:1,maxLife:1,
      size:Math.random()*10+8,color:'#ff1493',type:'heart',rotation:0,rotationSpeed:0});
  }
}
function spawnDeathExplosion(x,y){
  const colors=['#ff6b9d','#ff4757','#e879f9','#c084fc','#ffffff'];
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*5+2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,maxLife:1,
      size:Math.random()*5+3,color:colors[Math.floor(Math.random()*5)],
      type:'explosion',rotation:Math.random()*6,rotationSpeed:Math.random()*0.2-0.1});
  }
}

// ─── Spawn cactus ───
function spawnCactus(){
  const minGapY=currentGap/2+60;
  const maxGapY=canvasH-GROUND_HEIGHT-currentGap/2-60;
  const gapY=Math.random()*(maxGapY-minGapY)+minGapY;
  cacti.push({x:canvasW+20,gapY,gapSize:currentGap,scored:false,heartCollected:false,fadeOut:0,width:PIPE_WIDTH,height:0});
}

// ─── Drawing ───
function drawBackground(time){
  const g=ctx.createLinearGradient(0,0,0,canvasH-GROUND_HEIGHT);
  g.addColorStop(0,'#0a0a1a');g.addColorStop(0.35,'#111133');
  g.addColorStop(0.65,'#1a1040');g.addColorStop(1,'#2d1b4e');
  ctx.fillStyle=g;ctx.fillRect(0,0,canvasW,canvasH-GROUND_HEIGHT);
  // Moon
  const mx=canvasW*0.82,my=canvasH*0.13;
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,100);
  mg.addColorStop(0,'rgba(255,200,150,0.15)');mg.addColorStop(0.5,'rgba(255,150,200,0.05)');mg.addColorStop(1,'transparent');
  ctx.fillStyle=mg;ctx.beginPath();ctx.arc(mx,my,100,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(mx,my,22,0,Math.PI*2);ctx.fillStyle='rgba(255,240,220,0.9)';ctx.fill();
  // Stars
  for(const s of stars){
    const tw=Math.sin(time*s.twinkleSpeed+s.twinkleOffset)*0.3+0.7;
    ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,'+(s.brightness*tw)+')';ctx.fill();
  }
  // City silhouette
  ctx.fillStyle='rgba(20,10,40,0.8)';
  const gb=canvasH-GROUND_HEIGHT;
  const bldgs=[0,30,60,90,120,150,180,210,240,270,300,330,360,390];
  for(let i=0;i<bldgs.length;i++){
    const bh=30+Math.sin(i*1.7)*20+Math.cos(i*0.8)*10;
    const bx=bldgs[i];
    ctx.fillRect(bx,gb-bh,26,bh);
    ctx.fillStyle='rgba(255,200,100,0.25)';
    for(let wy=gb-bh+6;wy<gb-4;wy+=10){for(let wx=bx+4;wx<bx+22;wx+=8){if(Math.random()>0.35)ctx.fillRect(wx,wy,4,4);}}
    ctx.fillStyle='rgba(20,10,40,0.8)';
  }
}

function drawGround(){
  const gy=canvasH-GROUND_HEIGHT;
  const g=ctx.createLinearGradient(0,gy,0,canvasH);
  g.addColorStop(0,'#2d1b4e');g.addColorStop(0.1,'#1a1030');g.addColorStop(1,'#0f0a1a');
  ctx.fillStyle=g;ctx.fillRect(0,gy,canvasW,GROUND_HEIGHT);
  ctx.strokeStyle='rgba(255,107,157,0.3)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(canvasW,gy);ctx.stroke();
  ctx.fillStyle='rgba(255,107,157,0.06)';
  const off=groundOffset%18;
  for(let x=-off;x<canvasW;x+=18){ctx.beginPath();ctx.arc(x,gy+10,1.2,0,Math.PI*2);ctx.fill();}
}

function drawCactus(c){
  if(c.fadeOut>=1)return;
  const gy=canvasH-GROUND_HEIGHT;
  const topB=c.gapY-c.gapSize/2;
  const botT=c.gapY+c.gapSize/2;
  ctx.save();ctx.globalAlpha=1-c.fadeOut;
  // Top cactus
  if(topB>0){
    const cw=c.width*0.6,cx=c.x+(c.width-cw)/2;
    const tg=ctx.createLinearGradient(cx,0,cx+cw,0);
    tg.addColorStop(0,'#1a6b3a');tg.addColorStop(0.3,'#2d8f4e');tg.addColorStop(0.7,'#258040');tg.addColorStop(1,'#1a6035');
    ctx.fillStyle=tg;ctx.beginPath();ctx.roundRect(cx,-5,cw,topB+5,[0,0,6,6]);ctx.fill();
    // Arms left
    const ay=topB*0.3,aw=14,ah=25;
    ctx.fillStyle='#258040';
    ctx.beginPath();ctx.roundRect(cx-aw+2,ay,aw,ah,4);ctx.fill();
    ctx.beginPath();ctx.roundRect(cx-aw+2,ay-8,8,10,3);ctx.fill();
    // Arms right
    const a2y=topB*0.55;
    ctx.beginPath();ctx.roundRect(cx+cw-2,a2y,aw,ah,4);ctx.fill();
    ctx.beginPath();ctx.roundRect(cx+cw+aw-10,a2y-8,8,10,3);ctx.fill();
    // Spines
    ctx.strokeStyle='rgba(200,255,200,0.3)';ctx.lineWidth=1;
    for(let sy=8;sy<topB-5;sy+=12){
      ctx.beginPath();ctx.moveTo(cx-1,sy);ctx.lineTo(cx-6,sy-3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+cw+1,sy+4);ctx.lineTo(cx+cw+6,sy+7);ctx.stroke();
    }
    // Pot
    ctx.fillStyle='#5c3d2e';ctx.beginPath();ctx.roundRect(cx-4,topB-4,cw+8,10,3);ctx.fill();
    ctx.fillStyle='#7a5240';ctx.beginPath();ctx.roundRect(cx-6,topB-6,cw+12,5,2);ctx.fill();
  }
  // Bottom cactus
  if(botT<gy){
    const cw=c.width*0.6,cx=c.x+(c.width-cw)/2;
    const ch=gy-botT;
    ctx.fillStyle='#7a5240';ctx.beginPath();ctx.roundRect(cx-6,botT,cw+12,5,2);ctx.fill();
    ctx.fillStyle='#5c3d2e';ctx.beginPath();ctx.roundRect(cx-4,botT+4,cw+8,10,3);ctx.fill();
    const bg=ctx.createLinearGradient(cx,0,cx+cw,0);
    bg.addColorStop(0,'#1a6b3a');bg.addColorStop(0.3,'#2d8f4e');bg.addColorStop(0.7,'#258040');bg.addColorStop(1,'#1a6035');
    ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(cx,botT+12,cw,ch-12,[6,6,0,0]);ctx.fill();
    const ay=botT+ch*0.35,aw=14,ah=22;
    ctx.fillStyle='#258040';
    ctx.beginPath();ctx.roundRect(cx-aw+2,ay,aw,ah,4);ctx.fill();
    ctx.beginPath();ctx.roundRect(cx-aw+2,ay+ah-2,8,10,3);ctx.fill();
    const a2y=botT+ch*0.6;
    ctx.beginPath();ctx.roundRect(cx+cw-2,a2y,aw,ah,4);ctx.fill();
    ctx.beginPath();ctx.roundRect(cx+cw+aw-10,a2y+ah-2,8,10,3);ctx.fill();
    ctx.strokeStyle='rgba(200,255,200,0.3)';ctx.lineWidth=1;
    for(let sy=botT+20;sy<gy-5;sy+=12){
      ctx.beginPath();ctx.moveTo(cx-1,sy);ctx.lineTo(cx-6,sy-3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+cw+1,sy+4);ctx.lineTo(cx+cw+6,sy+7);ctx.stroke();
    }
  }
  ctx.restore();
}

function drawHeartPickup(hp){
  if(hp.collected)return;
  const pulse=Math.sin(hp.life*6)*0.15+1;
  const s=hp.scale*pulse;
  ctx.save();ctx.translate(hp.x,hp.y);ctx.scale(s,s);
  const glow=ctx.createRadialGradient(0,0,5,0,0,25);
  glow.addColorStop(0,'rgba(255,20,147,0.4)');glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,0,25,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff1493';ctx.beginPath();
  ctx.moveTo(0,4);ctx.bezierCurveTo(0,-2,-10,-8,-10,0);
  ctx.bezierCurveTo(-10,6,0,12,0,16);ctx.bezierCurveTo(0,12,10,6,10,0);
  ctx.bezierCurveTo(10,-8,0,-2,0,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(-3,-1,3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPlayer(y,rotation,ph){
  ctx.save();ctx.translate(PLAYER_X,y);
  const tilt=ph==='IDLE'?0:Math.max(-0.4,Math.min(1.0,rotation*0.06));
  ctx.rotate(tilt);
  const glowGrad=ctx.createRadialGradient(0,0,PLAYER_SIZE*0.3,0,0,PLAYER_SIZE*1.3);
  glowGrad.addColorStop(0,'rgba(255,107,157,0.2)');glowGrad.addColorStop(1,'transparent');
  ctx.fillStyle=glowGrad;ctx.beginPath();ctx.arc(0,0,PLAYER_SIZE*1.3,0,Math.PI*2);ctx.fill();
  if(boyImg&&boyImg.complete){
    ctx.save();ctx.beginPath();ctx.arc(0,0,PLAYER_SIZE,0,Math.PI*2);ctx.clip();
    ctx.drawImage(boyImg,-PLAYER_SIZE,-PLAYER_SIZE,PLAYER_SIZE*2,PLAYER_SIZE*2);ctx.restore();
    ctx.strokeStyle='rgba(255,107,157,0.6)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(0,0,PLAYER_SIZE,0,Math.PI*2);ctx.stroke();
  } else {
    ctx.font=PLAYER_SIZE*2+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ph==='GAMEOVER'||ph==='DYING'?'😵':'😊',0,2);
  }
  ctx.restore();
}

function drawHeartShape(x,y,size,color){
  ctx.fillStyle=color;ctx.beginPath();
  const s=size*0.4;
  ctx.moveTo(x,y+s*0.3);
  ctx.bezierCurveTo(x,y-s*0.3,x-s,y-s*0.3,x-s,y+s*0.1);
  ctx.bezierCurveTo(x-s,y+s*0.6,x,y+s,x,y+s*1.2);
  ctx.bezierCurveTo(x,y+s,x+s,y+s*0.6,x+s,y+s*0.1);
  ctx.bezierCurveTo(x+s,y-s*0.3,x,y-s*0.3,x,y+s*0.3);
  ctx.fill();
}

function drawSparkle(x,y,size,color){
  ctx.fillStyle=color;ctx.beginPath();
  for(let i=0;i<4;i++){
    const a=Math.PI/2*i;
    ctx.moveTo(x,y);
    ctx.lineTo(x+Math.cos(a-0.3)*size*0.3,y+Math.sin(a-0.3)*size*0.3);
    ctx.lineTo(x+Math.cos(a)*size,y+Math.sin(a)*size);
    ctx.lineTo(x+Math.cos(a+0.3)*size*0.3,y+Math.sin(a+0.3)*size*0.3);
  }
  ctx.fill();
}

function drawParticles(){
  for(const p of particles){
    ctx.save();ctx.globalAlpha=p.life;ctx.translate(p.x,p.y);ctx.rotate(p.rotation);
    if(p.type==='heart')drawHeartShape(0,0,p.size,p.color);
    else if(p.type==='sparkle')drawSparkle(0,0,p.size,p.color);
    else{ctx.beginPath();ctx.arc(0,0,p.size*p.life,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();}
    ctx.restore();
  }
}

function drawFloatingMessages(){
  for(const fm of floatingMessages){
    const alpha=Math.min(1,fm.life*2);
    const scale=1.0+(1-fm.life)*0.15;
    ctx.save();ctx.globalAlpha=alpha;ctx.translate(fm.x,fm.y);ctx.scale(scale,scale);
    ctx.font='bold '+fm.size+'px sans-serif';
    const tw=ctx.measureText(fm.text).width;
    const padX=18,padY=12;
    const pillW=tw+padX*2,pillH=fm.size+padY*2;
    // Glow behind pill
    ctx.shadowColor=fm.color;ctx.shadowBlur=15;
    ctx.fillStyle='rgba(0,0,0,0.75)';
    ctx.beginPath();ctx.roundRect(-pillW/2,-pillH/2,pillW,pillH,20);ctx.fill();
    // Border
    ctx.strokeStyle=fm.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(-pillW/2,-pillH/2,pillW,pillH,20);ctx.stroke();
    ctx.shadowBlur=0;
    // Text
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#ffffff';
    ctx.fillText(fm.text,0,1);
    ctx.restore();
  }
}

function drawScore(){
  const scale=1+scorePopScale*0.3;
  ctx.save();ctx.translate(canvasW/2,45);ctx.scale(scale,scale);
  const text=''+score;
  ctx.font='bold 32px sans-serif';
  const tw=ctx.measureText(text).width;
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();ctx.roundRect(-tw/2-18,-22,tw+36,44,22);ctx.fill();
  ctx.strokeStyle='rgba(255,107,157,0.25)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(-tw/2-18,-22,tw+36,44,22);ctx.stroke();
  ctx.font='20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('❤️',-tw/2-6,1);
  ctx.font='bold 32px sans-serif';ctx.fillStyle='#ffffff';
  ctx.fillText(text,6,2);
  ctx.restore();
}

function drawIdleScreen(time){
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#ff6b9d';ctx.shadowBlur=20;
  ctx.font='bold 26px sans-serif';ctx.fillStyle='#ff6b9d';
  ctx.fillText('Sumair & Maryam',canvasW/2,canvasH*0.2);
  ctx.shadowBlur=0;
  ctx.font='36px sans-serif';ctx.fillText('💕',canvasW/2,canvasH*0.28);
  ctx.font='13px sans-serif';ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillText('Fly through the cactus!',canvasW/2,canvasH*0.36);
  ctx.fillText('Collect hearts, win her love 💗',canvasW/2,canvasH*0.41);
  const pulse=Math.sin(time*0.004)*0.2+0.8;
  ctx.globalAlpha=pulse;ctx.font='bold 17px sans-serif';ctx.fillStyle='#ff6b9d';
  ctx.fillText('TAP TO START',canvasW/2,canvasH*0.72);ctx.globalAlpha=1;
  if(highScore>0){ctx.font='bold 13px sans-serif';ctx.fillStyle='#c084fc';ctx.fillText('👑 Best: '+highScore,canvasW/2,canvasH*0.80);}
}

// ─── Collision ───
function checkCollision(){
  const radius=PLAYER_SIZE*0.7;
  const gy=canvasH-GROUND_HEIGHT;
  if(playerY+radius>=gy||playerY-radius<=0)return true;
  for(const c of cacti){
    if(c.fadeOut>=0.8)continue;
    const topB=c.gapY-c.gapSize/2;
    const botT=c.gapY+c.gapSize/2;
    if(PLAYER_X+radius>c.x+5&&PLAYER_X-radius<c.x+c.width-5){
      if(playerY-radius<topB||playerY+radius>botT)return true;
    }
  }
  return false;
}

// ─── Update ───
function update(dt,now){
  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt*(p.type==='heart'?1.0:1.4);
    p.x+=p.vx;p.y+=p.vy;p.rotation+=p.rotationSpeed;
    if(p.type==='heart'){p.vy-=0.02;p.vx*=0.98;}
    else if(p.type==='explosion'){p.vy+=0.12;p.vx*=0.97;}
    else{p.vy+=0.08;p.vx*=0.97;}
    if(p.life<=0)particles.splice(i,1);
  }
  // Floating messages
  for(let i=floatingMessages.length-1;i>=0;i--){
    const fm=floatingMessages[i];
    fm.life-=dt*0.2;
    fm.y-=0.3;
    if(fm.life<=0)floatingMessages.splice(i,1);
  }
  // Heart pickups
  for(let i=heartPickups.length-1;i>=0;i--){
    const hp=heartPickups[i];
    hp.life-=dt*0.015;
    if(hp.collected){hp.scale*=1.05;if(hp.scale>2)heartPickups.splice(i,1);}
  }
  scorePopScale*=0.9;if(scorePopScale<0.01)scorePopScale=0;
  screenShake*=0.9;if(screenShake<0.1)screenShake=0;
  flashAlpha*=0.92;if(flashAlpha<0.01)flashAlpha=0;

  // Stars
  const speedMult=phase==='PLAYING'?pipeSpeed:0.3;
  for(const s of stars){if(s.x<-5)s.x=canvasW+5;else s.x-=s.speed*speedMult;}

  if(phase==='IDLE'){idleBob+=0.035;playerY=canvasH/2+Math.sin(idleBob)*12;playerVel=0;playerRotation=0;return;}

  if(phase==='DYING'){
    playerVel+=GRAVITY;playerY+=playerVel;playerRotation+=5;
    if(playerY>=canvasH-GROUND_HEIGHT-PLAYER_SIZE){
      playerY=canvasH-GROUND_HEIGHT-PLAYER_SIZE;playerVel=0;
      phase='GAMEOVER';
      if(score>highScore){highScore=score;newHighScore=true;localStorage.setItem('flappy_high_score',''+highScore);}
      deathMessageIndex=Math.floor(Math.random()*DEATH_MESSAGES.length);
      gameOverDelay=performance.now();
    }
    return;
  }
  if(phase==='GAMEOVER'){
    if(!showGameOver&&performance.now()-gameOverDelay>700){showGameOver=true;showOverlay();}
    return;
  }

  // ─── PLAYING ───
  totalDistance+=pipeSpeed;
  pipeSpeed=Math.min(PIPE_SPEED_MAX,PIPE_SPEED_INITIAL+totalDistance*PIPE_SPEED_INCREMENT);
  currentGap=Math.max(PIPE_GAP_MIN,PIPE_GAP_INITIAL-totalDistance*PIPE_GAP_DECREASE*0.001);
  currentSpawnInterval=Math.max(PIPE_SPAWN_MIN,PIPE_SPAWN_INITIAL-totalDistance*PIPE_SPAWN_DECREASE*0.001);

  playerVel+=GRAVITY;
  playerVel=Math.min(TERMINAL_VELOCITY,playerVel);
  playerY+=playerVel;
  playerRotation=playerVel;
  groundOffset+=pipeSpeed;

  // Spawn cactus
  if(now-lastPipeSpawn>currentSpawnInterval){spawnCactus();lastPipeSpawn=now;}

  // Move & score cactus
  for(let i=cacti.length-1;i>=0;i--){
    const c=cacti[i];
    c.x-=pipeSpeed;
    if(!c.scored&&c.x+c.width<PLAYER_X-PLAYER_SIZE){
      c.scored=true;score++;scorePopScale=1;
      spawnScoreParticles(PLAYER_X,playerY);
      heartPickups.push({x:c.x+c.width/2,y:c.gapY,life:1,scale:1,collected:false});
      const msgIndex=Math.min(score-1,LOVE_MESSAGES.length-1);
      const msg=LOVE_MESSAGES[msgIndex];
      floatingMessages.push({x:canvasW/2,y:canvasH*0.30,text:msg.text,life:1,maxLife:1,color:msg.color,size:22,emoji:'💕'});
    }
    if(c.scored&&!c.heartCollected)c.heartCollected=true;
    if(c.heartCollected)c.fadeOut=Math.min(1,c.fadeOut+0.04);
    // Mark heart collected near player
    for(const hp of heartPickups){
      if(!hp.collected&&Math.abs(hp.x-(c.x+c.width/2))<10){
        if(Math.hypot(hp.x-PLAYER_X,hp.y-playerY)<PLAYER_SIZE+20)hp.collected=true;
      }
    }
    if(c.x+c.width<-30||c.fadeOut>=1)cacti.splice(i,1);
  }

  // Collision
  if(checkCollision()){
    phase='DYING';screenShake=10;flashAlpha=0.5;
    spawnDeathExplosion(PLAYER_X,playerY);
  }
}

// ─── Render ───
function render(time){
  ctx.clearRect(0,0,canvasW,canvasH);
  ctx.save();
  if(screenShake>0.5)ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
  drawBackground(time);
  drawGround();
  for(const c of cacti)drawCactus(c);
  for(const hp of heartPickups)drawHeartPickup(hp);
  drawParticles();
  drawFloatingMessages();
  if(phase!=='GAMEOVER')drawPlayer(playerY,playerRotation,phase);
  if(phase==='PLAYING')drawScore();
  if(phase==='IDLE')drawIdleScreen(time);
  if(flashAlpha>0.01){ctx.fillStyle='rgba(255,255,255,'+flashAlpha+')';ctx.fillRect(-20,-20,canvasW+40,canvasH+40);}
  ctx.restore();
}

// ─── Game loop ───
function gameLoop(time){
  if(lastTime===0)lastTime=time;
  const delta=Math.min(time-lastTime,33);
  lastTime=time;
  const dt=delta/16.67;
  update(dt,time);
  render(time);
  animFrame=requestAnimationFrame(gameLoop);
}

// ─── Overlay ───
function showOverlay(){
  document.getElementById('finalScore').textContent=score;
  document.getElementById('bestScore').textContent=highScore;
  document.getElementById('deathMsg').textContent='“'+DEATH_MESSAGES[deathMessageIndex]+'”';
  document.getElementById('newBestBox').style.display=newHighScore?'block':'none';
  overlay.classList.add('show');
}

function hideOverlay(){overlay.classList.remove('show');}

// ─── Controls ───
function startGame(){
  phase='PLAYING';score=0;newHighScore=false;screenShake=0;flashAlpha=0;
  playerY=canvasH/2;playerVel=0;playerRotation=0;
  cacti=[];particles=[];floatingMessages=[];heartPickups=[];
  pipeSpeed=PIPE_SPEED_INITIAL;currentGap=PIPE_GAP_INITIAL;
  currentSpawnInterval=PIPE_SPAWN_INITIAL;lastPipeSpawn=0;totalDistance=0;
  scorePopScale=0;groundOffset=0;showGameOver=false;gameOverDelay=0;
  playerVel=FLAP_VELOCITY;
  spawnFlapParticles(PLAYER_X,playerY);
  hideOverlay();
}

function flap(){
  if(phase==='IDLE'){startGame();return;}
  if(phase==='PLAYING'){playerVel=FLAP_VELOCITY;spawnFlapParticles(PLAYER_X,playerY);}
}

function handleInput(e){
  if(e)e.preventDefault();
  if(phase==='GAMEOVER'&&showGameOver)return;
  flap();
}

canvas.addEventListener('mousedown',handleInput);
canvas.addEventListener('touchstart',handleInput,{passive:false});
document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handleInput();}
});
document.getElementById('retryBtn').addEventListener('click',function(e){
  e.stopPropagation();startGame();
});

// ─── Init ───
resize();
window.addEventListener('resize',resize);
lastTime=0;
animFrame=requestAnimationFrame(gameLoop);
</script>
</body>
</html>
